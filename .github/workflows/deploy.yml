name: 'Azure Terraform & Docker Deploy'

# 1. Trigger: जैसे ही तुम main ब्रांच पर push करोगे, रोबोट काम शुरू कर देगा
on:
  push:
    branches:
      - main

jobs:
  terraform-and-docker:
    name: 'Run Terraform and Deploy Docker'
    runs-on: ubuntu-latest # GitHub की तरफ से मिलने वाला मुफ़्त का कंप्यूटर 💻

    # यहाँ गिटहब तुम्हारे सीक्रेट्स को रोबोट के एनवायरनमेंट में सेट करेगा
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
    # स्टेप 1: तुम्हारा सारा कोड इस मुफ़्त कंप्यूटर पर डाउनलोड करना
    - name: Checkout Code
      uses: actions/checkout@v3

    # स्टेप 2: इस मुफ़्त कंप्यूटर पर टेराफॉर्म सॉफ्टवेयर सेटअप करना
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    # स्टेप 3: टेराफॉर्म इनिशियलाइज़ करना
    - name: Terraform Init
      run: terraform init

    # स्टेप 4: कोड का सिंटैक्स चेक करना
    - name: Terraform Validate
      run: terraform validate

    # स्टेप 5: फाइनल धमाका - सीधे Azure पर सर्वर लाइव करना 🚀
    - name: Terraform Apply
      run: terraform apply --auto-approve